<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VexUI Docs</title>
<meta name="description" content="Документация VexUI — офсет-based UI библиотека для Roblox.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <div class="frame">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="icon-btn menu-toggle" onclick="openSidebar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </div>
        <a class="brand" onclick="navigate('about')">
          <span class="brand-mark">V</span>
          VexUI
        </a>
      </div>
      <div class="topbar-right">
        <div class="search-trigger" onclick="openSearch()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <span>Search...</span>
          <kbd>Ctrl K</kbd>
        </div>
        <div class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </div>
        <a class="gh-link" href="https://github.com/sshrk/VexUI" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56 0-.27-.01-1.16-.02-2.11-3.2.7-3.88-1.36-3.88-1.36-.52-1.33-1.28-1.69-1.28-1.69-1.04-.71.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.02 1.75 2.68 1.25 3.34.95.1-.74.4-1.25.72-1.54-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.05 11.05 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.14 0 1.54-.01 2.79-.01 3.17 0 .31.2.67.8.56A10.52 10.52 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/></svg>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <div class="shell">
      <nav class="sidebar" id="sidebar"></nav>
      <main class="content" id="content">
        <div class="content-inner" id="content-inner"></div>
      </main>
    </div>
  </div>

  <div class="search-overlay" id="search-overlay" onclick="if(event.target===this) closeSearch()">
    <div class="search-box">
      <input class="search-input" id="search-input" placeholder="Search docs…" oninput="renderSearchResults(this.value)">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <script src="assets/content.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
